name: SecMon CI

on:
  push:
    paths: ["secmon-linux-security/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["secmon-linux-security/**", ".github/workflows/ci.yml"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secmon-linux-security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e '.[dev]'
      - run: python -m compileall -q backend database tests
      - run: ruff check backend database tests
      - run: mypy backend database
      - run: python database/migrate.py
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secmon-linux-security/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
