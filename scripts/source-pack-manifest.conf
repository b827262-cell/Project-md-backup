# source-pack-manifest.conf
# Defines the fixed SOURCE_PACKS uploaded to ChatGPT Project (must stay <= 25).
# Format: FILENAME | MODE | PURPOSE | READ_WHEN | SRC_GLOB1[,SRC_GLOB2,...]
# MODE: auto = generated mechanically; manual = preserved/passthrough.

00_MASTER_CONTEXT.md      | manual | Single authoritative context for all AI tools | conflict resolution, onboarding any model |
01_CURRENT_STATUS.md      | auto   | Latest overall project state                  | starting any session | RAW_REPORTS/HANDOFF/*.md
02_AI_COLLAB_CONFIG.md     | manual | Multi-model governance                         | deciding which model does what |
03_SQLITE_RC1_MASTER.md    | auto   | SQLite RC1 consolidated truth                  | SQLite runtime, RC1 validation | RAW_REPORTS/SQLITE_RC1/*.md
04_SQLITE_RUNTIME_PATCHES.md | auto | Applied runtime patches                         | reviewing what was already patched | RAW_REPORTS/SQLITE_RC1/*PATCH*.md,RAW_REPORTS/CODEX_REPORTS/*PATCH*.md
05_SQLITE_OPEN_BLOCKERS.md | auto   | Open P0/P1 blockers before cutover             | planning next fix | RAW_REPORTS/SQLITE_RC1/*AUDIT*.md,RAW_REPORTS/SQLITE_RC1/*BLOCKER*.md
06_VPS_LITE_DEPLOYMENT.md  | auto   | VPS deployment + RAM budget                    | deployment, memory tuning | RAW_REPORTS/VPS_LITE/*.md
07_GIT_BRANCH_PR_TAGS.md   | auto   | Branch / PR / tag state                        | git operations | RAW_REPORTS/HANDOFF/*BRANCH*.md,RAW_REPORTS/HANDOFF/*PR*.md
08_TEST_COMMANDS_SMOKE.md  | auto   | Build + smoke test commands                    | running validation | RAW_REPORTS/SQLITE_RC1/*SMOKE*.md,RAW_REPORTS/HANDOFF/*TEST*.md
09_ERROR_KNOWLEDGE_BASE.md | auto   | Known errors + fixes                           | hitting a known error | RAW_REPORTS/**/*ERROR*.md,RAW_REPORTS/**/*FIX*.md
10_CODEX_PROMPTS.md        | manual | Reusable Codex CLI prompts                     | dispatching Codex |
11_CLAUDE_REVIEW_PROMPTS.md | manual | Reusable Sonnet review prompts                | dispatching review |
12_DAILY_HANDOFF_LATEST.md | auto   | Most recent handoff snapshot                   | resuming work | RAW_REPORTS/HANDOFF/*.md
13_DECISION_LOG.md         | manual | Append-only architectural decisions            | why a decision was made |
14_ARCHIVE_INDEX.md        | auto   | Full index of every raw report                 | finding archived detail | RAW_REPORTS/**/*.md
